services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8096:8096"
    volumes:
      - ./backend/sqlite:/app/sqlite
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=
      - VITE_HMR_HOST=
      - VITE_HMR_CLIENT_PORT=
      - VITE_HMR_PROTOCOL=
    depends_on:
      - backend
    restart: unless-stopped
