services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8096:8096"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8096
    depends_on:
      - backend